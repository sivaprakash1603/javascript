<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Quiz Application</title>
    <script>
        document.addEventListener('DOMContentLoaded',async ()=>{
            const quizContainer=document.getElementById('quizContainer');
            const resultContainer=document.getElementById('resultContainer');
            try {
                const response=await fetch('./quiz.json');
                const quizData=await response.json();
                console.log(quizData);
                quizData.forEach(quiz => {
                const questionDiv=document.createElement('div');
                questionDiv.classList.add('question');
                const questionText=document.createElement('p');
                questionText.textContent=quiz.question;
                questionDiv.appendChild(questionText);

                quiz.options.forEach(option => {
                    const optionLabel=document.createElement('label');
                    const optionInput=document.createElement('input');
                    optionInput.type='radio';
                    optionInput.name=quiz.id;
                    optionInput.value=option;
                    optionLabel.appendChild(optionInput);
                    optionLabel.appendChild(document.createTextNode(option));
                    questionDiv.appendChild(optionLabel);
                    questionDiv.appendChild(document.createElement('br'));
                });
                quizContainer.appendChild(questionDiv);
            });
            const submitButton=document.createElement('button');
            submitButton.textContent='Submit';
            quizContainer.appendChild(submitButton);
            submitButton.addEventListener('click',()=>{
                let score=0;
                let wrongAnswers=[];
                quizData.forEach(quiz=>{
                    const selectedOption=document.querySelector(`input[name="${quiz.id}"]:checked`);
                    console.log(`Selected option for quiz ${quiz.id}:`, selectedOption ? selectedOption.value : 'None');
                    console.log(`Correct answer for quiz ${quiz.id}:`, quiz.correctAnswer);
                    if(selectedOption && selectedOption.value===quiz.correctAnswer){
                        score++;
                    } else if (selectedOption) {
                        wrongAnswers.push({ quiz, selectedOption: selectedOption.value });
                    }
                });
                const resultContainer=document.getElementById('resultContainer');
                resultContainer.textContent=`Your score is ${score}/${quizData.length}`;
                if(wrongAnswers.length>0){
                    const wrongAnswersDiv=document.createElement('div');
                    wrongAnswersDiv.innerHTML='<h3>Wrong Answers:</h3>';
                    wrongAnswers.forEach(({ quiz, selectedOption }) => {
                        const wrongAnswerP=document.createElement('p');
                        wrongAnswerP.innerHTML=`<strong>Question:</strong> ${quiz.question} <br> <strong>Your Answer:</strong> ${selectedOption} <br> <strong>Correct Answer:</strong> ${quiz.correctAnswer} <br> <strong>Explanation:</strong> ${quiz.explanation}`;
                        wrongAnswersDiv.appendChild(wrongAnswerP);
                    });
                    resultContainer.appendChild(wrongAnswersDiv);
                }



            }   
        )
                } catch (error) {
                console.error("Error fetching quiz data:", error);
                quizContainer.textContent="Failed to load quiz data.";
                return;
            }
                
            });
    </script>
</head>
<body>
    <h1>Dynamic Quiz Application</h1>
    <p>Welcome to the Dynamic Quiz Application!</p>
    <div id="quizContainer"></div>
    <div id="resultContainer"></div>

</body>
</html>
